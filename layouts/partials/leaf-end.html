{{- $leaf := .leaf -}}
<article class="leaf leaf--end" data-kind="end" data-index="{{ .index }}">
  <div class="leaf__end-card">
    <svg class="leaf__end-ornament" viewBox="0 0 64 64" aria-hidden="true">
      <path fill="currentColor" d="M10 36
                                   C 8 30, 9 24, 13 20
                                   L 13 13
                                   L 17 19
                                   L 19 11
                                   L 23 19
                                   L 26 14
                                   C 33 16, 41 21, 43 30
                                   L 57 32
                                   C 59 33, 59 35, 57 36
                                   L 43 38
                                   C 42 46, 34 50, 26 49
                                   C 15 48, 7 42, 10 36 Z"/>
      <circle cx="32" cy="27" r="1.8" fill="var(--paper)"/>
    </svg>
    <h2 class="leaf__end-text">{{ $leaf.text }}</h2>
    <p class="leaf__end-author">
      <span class="leaf__credit"><span class="leaf__credit-label">Story</span> {{ site.Params.author }}</span>
      <span class="leaf__credit"><span class="leaf__credit-label">Illustrations</span> {{ site.Params.illustrator }}</span>
    </p>

    <div class="leaf__share">
      <p class="leaf__share-prompt">Pass it on</p>
      <div class="leaf__share-row">
        <button type="button" class="share-btn" data-share="native" hidden>Share…</button>
        <button type="button" class="share-btn" data-share="copy">Copy link</button>
        <a class="share-btn" data-share="email" href="#">Email</a>
        <a class="share-btn" data-share="bluesky" href="#" target="_blank" rel="noopener">Bluesky</a>
        <a class="share-btn" data-share="whatsapp" href="#" target="_blank" rel="noopener">WhatsApp</a>
        <a class="share-btn" data-share="threads" href="#" target="_blank" rel="noopener">Threads</a>
      </div>
    </div>

    <p class="leaf__colophon">
      © {{ site.Params.copyrightYear }} {{ site.Params.author }} &amp; {{ site.Params.illustrator }}.
      Licensed under
      <a href="{{ site.Params.licenceUrl }}" target="_blank" rel="noopener">{{ site.Params.licence }}</a>.
    </p>
  </div>
</article>
